<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>張芷瑜的數位名片</title>
    <style>
        :root {
            --bg-color: #0B1D3A; 
            --btn-color: #FDE68A; 
            --text-main: #FFFFFF;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            transition: background-color 0.6s ease;
            /* 防止手機端長按背景出現奇怪選單 */
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        .card {
            padding: 20px;
            max-width: 350px;
            width: 85%;
            z-index: 10;
        }

        /* 絕對鎖死的大頭貼容器 */
        .avatar-box {
            width: 150px;
            height: 150px;
            margin: 0 auto 25px auto;
            border-radius: 50%;
            overflow: hidden; /* 確保內容永遠是圓的 */
            border: 4px solid var(--btn-color);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.5);
            position: relative;
            transition: transform 0.3s ease;
            z-index: 100;
        }

        /* 放大效果：只縮放容器，不影響版面 */
        .avatar-box:active, .avatar-box:hover {
            transform: scale(1.3);
        }

        .profile-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: top;
            display: block;
            pointer-events: none; /* 讓圖片本身不接收長按事件，防止儲存 */
        }

        @keyframes rotate-vinyl {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .spin {
            animation: rotate-vinyl 5s linear infinite;
        }

        h1 {
            font-size: 1.8rem;
            margin: 0 0 8px 0;
            letter-spacing: 1px;
        }

        .subtitle {
            font-size: 1rem;
            margin-bottom: 30px;
            color: var(--btn-color);
            opacity: 0.9;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            display: block;
            padding: 14px;
            background-color: var(--btn-color);
            color: #0B1D3A; 
            text-decoration: none;
            border-radius: 25px;
            font-weight: bold;
            font-size: 0.95rem;
            -webkit-user-select: none;
            user-select: none;
        }

        .instruction {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.4);
            margin-top: 30px;
        }
    </style>
</head>
<body>

    <audio id="bgMusic" src="https://raw.githubusercontent.com/chang11yu/my-website-assets/main/music.mp3" loop></audio>

    <div class="card">
        <div class="avatar-box" id="musicToggle">
            <img src="https://raw.githubusercontent.com/chang11yu/my-website-assets/main/image.jpg" alt="張芷瑜" class="profile-img" id="profileImg">
        </div>
        
        <h1>張芷瑜</h1>
        <div class="subtitle">熱愛音樂與攝影的<br>嘉義大學學生</div>

        <div class="links">
            <a href="https://www.instagram.com/_.chang._yu?igsh=MW5nZ2pxNnMwOG9vYw%3D%3D&utm_source=qr" target="_blank" class="btn">Instagram</a>
            <a href="https://www.threads.com/@_.chang._yu?igshid=NTc4MTIwNjQ2YQ==" target="_blank" class="btn">Threads</a>
            <a href="https://github.com/chang11yu" target="_blank" class="btn">GitHub</a>
            <a href="https://youtu.be/ja6Rc5YL8vg?si=EhlvTYcE0uVArK81" target="_blank" class="btn">🎧 原曲：Ms. potato</a>
        </div>

        <div class="instruction">
            💡 點擊背景換色 / 點照片播音樂<br>
            💿 手機版點擊頭貼可放大照片和播放專屬音樂<br>
            🔍 滑鼠懸停照片可放大
        </div>
    </div>

    <script>
        // 背景隨機換色
        const colors = ['#0B1D3A', '#1E3A8A', '#020617', '#0F766E', '#4C1D95'];
        document.body.addEventListener('click', (e) => {
            if (e.target.closest('.btn') || e.target.closest('.avatar-box')) return;
            document.body.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
        });

        // 音樂與旋轉
        const box = document.getElementById('musicToggle');
        const img = document.getElementById('profileImg');
        const music = document.getElementById('bgMusic');

        box.addEventListener('click', (e) => {
            e.stopPropagation();
            if (music.paused) {
                music.play().catch(err => console.log("需點擊後播放"));
                img.classList.add('spin');
            } else {
                music.pause();
                img.classList.remove('spin');
            }
        });
    </script>
</body>
</html>
