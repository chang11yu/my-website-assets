<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>張芷瑜的數位名片</title>
    <style>
        :root {
            --bg-color: #0B1D3A; 
            --btn-color: #FDE68A; 
            --btn-hover: #FCD34D;
            --text-main: #FFFFFF;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            transition: background-color 0.6s ease; 
            overflow-x: hidden;
        }

        .card {
            padding: 40px 20px;
            max-width: 400px;
            width: 90%;
            z-index: 10;
        }

        /* 修正後的頭像容器：保證永遠是圓的 */
        .avatar-container {
            width: 160px;
            height: 160px;
            margin: 0 auto 20px auto;
            position: relative;
            border-radius: 50%;
            /* 這是關鍵：強制內容超出部分隱藏，保證放大也是圓的 */
            overflow: hidden; 
            border: 4px solid var(--btn-color);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.6);
            transition: transform 0.3s ease;
            touch-action: none; /* 防止手機長按時觸發系統選單 */
        }

        /* 放大效果：只縮放容器本身 */
        .avatar-container:hover, .avatar-container:active {
            transform: scale(1.5);
            z-index: 100;
        }

        .profile-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: top;
            cursor: pointer;
            display: block;
        }

        @keyframes rotate-vinyl {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .spin {
            animation: rotate-vinyl 5s linear infinite;
        }

        h1 {
            font-size: 2.2rem;
            margin: 0 0 5px 0;
            font-weight: 800;
        }

        .subtitle {
            font-size: 1.1rem;
            margin: 0 0 30px 0;
            color: var(--btn-color);
            line-height: 1.5;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            display: block;
            padding: 15px;
            background-color: var(--btn-color);
            color: #0B1D3A; 
            text-decoration: none;
            border-radius: 30px;
            font-weight: 700;
            transition: 0.2s;
        }

        .btn:hover {
            background-color: var(--btn-hover);
            transform: translateY(-3px);
        }

        .instruction {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 30px;
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <audio id="bgMusic" src="https://raw.githubusercontent.com/chang11yu/my-website-assets/main/music.mp3" loop></audio>

    <div class="card">
        <div class="avatar-container" id="avatarTrigger">
            <img src="https://raw.githubusercontent.com/chang11yu/my-website-assets/main/image.jpg" alt="張芷瑜" class="profile-img" id="profileImg">
        </div>
        
        <h1>張芷瑜</h1>
        <div class="subtitle">熱愛音樂與攝影的<br>嘉義大學學生</div>

        <div class="links">
            <a href="https://www.instagram.com/_.chang._yu?igsh=MW5nZ2pxNnMwOG9vYw%3D%3D&utm_source=qr" target="_blank" class="btn">Instagram</a>
            <a href="https://www.threads.com/@_.chang._yu?igshid=NTc4MTIwNjQ2YQ==" target="_blank" class="btn">Threads</a>
            <a href="https://github.com/CJZhiY" target="_blank" class="btn">GitHub</a>
            <a href="https://youtu.be/ja6Rc5YL8vg?si=EhlvTYcE0uVArK81" target="_blank" class="btn">🎧 原曲播放：Ms. potato</a>
        </div>

        <div class="instruction">
            💡 點擊背景切換顏色<br>
            💿 點擊照片播放音樂<br>
            🔍 長按照片放大檢視
        </div>
    </div>

    <script>
        // 背景換色
        const colors = ['#0B1D3A', '#1E3A8A', '#020617', '#0F766E', '#4C1D95'];
        document.body.addEventListener('click', (e) => {
            if (e.target.closest('.btn') || e.target.id === 'profileImg') return;
            const randomColor = colors[Math.floor(Math.random() * colors.length)];
            document.body.style.backgroundColor = randomColor;
        });

        // 音樂與旋轉
        const img = document.getElementById('profileImg');
        const music = document.getElementById('bgMusic');

        img.addEventListener('click', (e) => {
            e.stopPropagation();
            if (music.paused) {
                music.play();
                img.classList.add('spin');
            } else {
                music.pause();
                img.classList.remove('spin');
            }
        });
    </script>
</body>
</html>
